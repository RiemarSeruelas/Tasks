<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Apex | Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="login-screen">
    <div class="login-card">
        <i class="ph-bold ph-shield-check" style="font-size: 4rem; color: var(--accent-blue);"></i>
        <h2 style="margin: 20px 0; color: var(--text-main); letter-spacing: 2px;">TERMINAL LOGIN</h2>
        
        <input type="text" id="u" placeholder="Admin Username">
        <input type="password" id="p" placeholder="Password">
        
        <button onclick="login()">ACCESS SYSTEM</button>
    </div>

    <script>
        // Apply theme on load
        document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');

        function login() {
            const user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;
            
            if(user === 'admin' && pass === 'admin') {
                sessionStorage.setItem('isLoggedIn', 'true');
                window.location.href = 'index.html';
            } else {
                alert('Invalid Credentials');
            }
        }
    </script>
</body>
</html>
