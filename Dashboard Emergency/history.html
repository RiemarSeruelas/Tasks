<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard || History</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <nav id="sidebar">
        <div class="logo-section"><i class="ph-bold ph-shield-check"></i><span class="logo-text">Emergency Dashboard</span></div>
        <div class="nav-links">
           <a href="index.html" class="nav-item"><i class="ph ph-users"></i><span class="nav-text">Personel</span></a>
            <a href="map.html" class="nav-item"><i class="ph ph-map-trifold"></i><span class="nav-text">Evac Map</span></a>
            <a href="history.html" class="nav-item active"><i class="ph ph-clock-counter-clockwise"></i><span class="nav-text">History</span></a>
            <a href="analytics.html" class="nav-item"><i class="ph ph-clock-counter-clockwise"></i><span class="nav-text">Analytics</span></a>
            <a href="rescue.html" class="nav-item"><i class="ph ph-first-aid"></i><span class="nav-text">Rescue Team</span></a>
        </div>
    </nav>


    <div class="main-content">
        <header>
    <div class="header-left">
        <button id="toggleBtn" class="header-btn" title="Toggle Sidebar">
            <i class="ph ph-list"></i>
        </button>
        <button onclick="toggleTheme()" class="header-btn" id="themeIcon" title="Toggle Theme">
            <i class="ph ph-moon"></i>
        </button>
    </div>
    
    <div class="header-right" style="justify-content: flex-end;">
        <span style="font-weight: 700; font-size: 0.9rem;">Admin</span>
    </div>
</header>


        <div class="content-body">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <h2>Emergency Event Logs</h2>
                <p style="font-size: 0.85rem; color: var(--text-muted);">
                    Excel exports include duration and color-coded safety status.
                </p>
            </div>

            <div id="log-container" style="background: var(--card-bg); border-radius: 15px; border: 1px solid var(--border-color); overflow: hidden;">
                <div style="padding: 40px; text-align: center; color: var(--text-muted);">
                    <i class="ph ph-file-search" style="font-size: 2rem; display: block; margin-bottom: 10px;"></i>
                    No emergency triggers recorded yet.
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
